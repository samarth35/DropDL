name: Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            requirements-windows.lock

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $extract = Join-Path $env:RUNNER_TEMP "ffmpeg"
          curl.exe `
            --location `
            --fail `
            --retry 5 `
            --retry-delay 5 `
            --output $archive `
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          if ($LASTEXITCODE -ne 0) {
            throw "FFmpeg download failed with exit code $LASTEXITCODE."
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $extract
          $bin = Get-ChildItem $extract -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1 |
            ForEach-Object { $_.Directory.FullName }
          if (-not $bin) {
            throw "FFmpeg bin directory was not found."
          }
          "FFMPEG_BIN=$bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build DropDL
        shell: pwsh
        run: |
          .\build-windows.ps1 `
            -FfmpegBin $env:FFMPEG_BIN `
            -Python (Get-Command python).Source `
            -RecreateEnvironment

      - name: Verify release evidence
        shell: pwsh
        run: |
          $proof = Get-Content outputs\DropDL-Windows.proof.json -Raw | ConvertFrom-Json
          $actual = (Get-FileHash outputs\DropDL-Windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($proof.zip_sha256 -ne $actual) {
            throw "The proof file does not match the release ZIP."
          }
          $lockHash = (Get-FileHash requirements-windows.lock -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($proof.requirements_lock_sha256 -ne $lockHash) {
            throw "The proof file does not match the dependency lock."
          }
          if (-not $proof.built_folder_smoke.ok -or -not $proof.extracted_zip_smoke.ok) {
            throw "Packaged runtime verification did not pass."
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DropDL-Windows
          path: |
            outputs/DropDL-Windows.zip
            outputs/DropDL-Windows.sha256
            outputs/DropDL-Windows.proof.json
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            outputs/DropDL-Windows.zip
            outputs/DropDL-Windows.sha256
            outputs/DropDL-Windows.proof.json
          generate_release_notes: true
